name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint and unit tests
        run: |
          chmod +x gradlew
          ./gradlew lintRelease testReleaseUnitTest

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: statusave
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PappVersionCode=$(( ${{ github.run_number }} + 1 )) \
            -PappVersionName=1.0.${{ github.run_number }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk StatuSave-1.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: StatuSave 1.0.${{ github.run_number }}
          generate_release_notes: true
          files: StatuSave-1.0.${{ github.run_number }}.apk
